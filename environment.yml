name: aps-emotion-ai
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Deep Learning
  - pytorch::pytorch
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=11.8
  
  # Core Scientific
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - seaborn
  
  # Audio Processing
  - librosa
  - soundfile
  
  # API & Web Server
  - fastapi
  - uvicorn
  
  # Visualization & Dashboard
  - streamlit
  
  # Pip-based packages
  - pip
  - pip:
    - transformers>=4.38.0
    - datasets
    - pyaudio
    - openai-whisper
    - kaggle
