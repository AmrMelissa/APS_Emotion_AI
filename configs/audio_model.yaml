# Audio Model Configuration
# ===========================

# Model Architecture
model:
  pretrained_model: "facebook/hubert-large-ls960-ft"  # ou "facebook/wav2vec2-large-xlsr-53-english"
  model_type: "hubert"  # "hubert" ou "wav2vec2"
  
  # Classification Head
  num_classes: 7  # Nombre d'émotions (neutral/calm, happy, sad, angry, fearful, disgust, surprised)
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  
  # Fine-tuning
  freeze_backbone: false  # Laisser false pour fine-tuner le modèle complet
  num_freeze_layers: 0  # Nombre de couches à geler (0 = aucune)

# Audio Preprocessing
audio:
  sample_rate: 16000  # Fréquence d'échantillonnage (Hz)
  max_duration: 10  # Durée maximale en secondes
  normalize: true
  
  # Augmentation (optionnel)
  augmentation:
    pitch_shift: false
    time_stretch: false
    background_noise: false

# Training Hyperparameters
training:
  num_epochs: 10
  batch_size: 16
  learning_rate: 1e-4
  weight_decay: 1e-5
  warmup_steps: 500
  max_grad_norm: 1.0
  
  # Optimizer
  optimizer: "adam"  # "adam" ou "adamw"
  
  # Scheduler
  scheduler: "linear"  # "linear", "cosine", "step"
  
  # Validation
  eval_strategy: "epoch"  # Évaluer à chaque époque
  save_strategy: "best"  # Sauvegarder le meilleur modèle
  metric_for_best_model: "f1"
  
  # Loss
  loss_function: "cross_entropy"

# Data
data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  seed: 42

# Paths
paths:
  data_dir: "data/processed/audio"
  checkpoint_dir: "checkpoints/audio_model"
  results_dir: "results/audio"

# Device
device: "cuda"  # "cuda" ou "cpu"

# Logging
logging:
  log_dir: "logs/audio_model"
  log_level: "info"
